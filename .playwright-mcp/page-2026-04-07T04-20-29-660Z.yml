              - generic [ref=e196]:
                - paragraph [ref=e199]: Nestled on the highly sought-after address of Howes Road, this 16.46 acre (6.663HA) property delivers the perfect blend of rural tranquility, coastal proximity, and the warmth and character of this charming cottage. Just minutes from pristine beaches like Farnborough Beach, Yeppoon's vibrant amenities, schools, and cafes, yet privately positioned amid improved pastures and mountain vistas - this is a sensational lifestyle acreage like no other. Step inside this beautifully restored home, where every detail reflects thought, style and comfort. The heart of the home is the stunning kitchen featuring premium stone benchtops, elegant brass handles and tapware, a 900mm 5-burner gas stove, pyrolytic self-cleaning oven, drawer dishwashers, fluted glass cupboards, 2-pac cabinetry, and a spacious butler's pantry with a second oven. There is an incredible amount of storage with soft-close drawers - designed for effortless entertaining and everyday indulgence. Contemporary bathrooms impress with brass tapware accents, luxurious rain showers, and a deluxe bathtub for ultimate relaxation. Stunning original timber floors, tongue and groove paneling, and plantation shutters add timeless charm, complemented by 9ft ceilings upstairs and a raked ceiling in the master suite. Stay comfortable year-round with air conditioning in the main living area and individual split systems in each of the 3 spacious bedrooms. Sustainability meets self-sufficiency with a powerful 19.8kW solar system, multiple water sources - including a 5,000 gallon house tank, additional 4,500 gallon and 3,300 gallon tanks, plus a reliable bore and a tree-lined dam. Entertain with friends on the expansive deck alongside the saltwater swimming pool or start your day with your morning coffee on the rear deck overlooking the serene paddock. A true lifestyle property offering a fenced paddock of improved pastures, feed shed, round yard, cattle run, and capacity to comfortably run 13 head of livestock. A standout is the impressive 6-bay 322m2 shed featuring high-clearance bays (2 at 4.125m height), mezzanine storage, and 3-phase power - ideal for vehicles, machinery, a workshop and plenty of room for the boat too. This rare gem on Howes Road combines peaceful living on acreage with the convenience of living only 10 minutes from the centre of Yeppoon. Don't miss out on securing your slice of one of the region's most desirable rural pockets. Properties of this calibre seldom become available - make your offer today!
